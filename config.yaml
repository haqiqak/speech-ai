profiling:
  ewma_alpha: 0.35
  confidence_events: 30
  weights:
    onset: 0.45
    length: 0.25
    frequency: 0.20
    grammatical_class: 0.10
  detection:
    repetition_window: 2
    prolongation_percentile: 90
    prolongation_min_seconds: 0.65
    block_gap_seconds: 0.55
    filler_words:
      - uh
      - um
      - er
      - erm
      - like
rewrite:
  lambda: 0.55
  mu: 0.12
  tau: 0.80
  top_k: 12
  risk_threshold: 0.55
  min_improvement: 0.01
  lambda_sweep:
    - 0.0
    - 0.25
    - 0.5
    - 0.75
    - 1.0
eval:
  output_dir: outputs
